spring:
  application:
    name: file-loader-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ussd
    username: ${DB_USERNAME:default}
    password: ${DB_PASSWORD:default}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

app:
  loader:
    archive-folder: ${ARCHIVE_FOLDER:${user.dir}/archive}
    error-folder: ${ERROR_FOLDER:${user.dir}/errors}
    watch-folder: ${WATCH_FOLDER:${user.dir}/watch}
    poll-interval-ms: 60000
